model_name: "VideoDiT"
dynamics_class: "DiffusionForcing_WM"
model_type: "dit_s"

model_config:
  in_channels: 16
  patch_size: 2
  action_compress_rate: 4
  max_frames: 37
  action_dropout_prob: 0.0
  temporal_causal: false
  vae_name: "WanVAE"
  vae_config:
    - "Wan2.1_VAE.pth"
  scheduler: "FlowMatch"
  training_timesteps: 1000
  motion_weighting_gamma: 0.0
  focal_alpha: 0.0
  action_encoder:
    type: "mlp"
    latent_dim: 64
    hidden_dim: 128
    num_layers: 2
    dropout: 0.0
    activation: "silu"

dataset:
  name: "push_cube"
  seq_len: 37
  obs_shape: [3, 240, 240]
  train_size: 256
  ind_test_size: 16
  ood_test_size: 16
  test_cuts: 2

action_bucket:
  strategy: "magnitude_median"
  quantile: 0.5
  threshold: null
  train_filter_bucket: "small"

distillation:
  enabled: false

training:
  batch_size: 1
  learning_rate: 1e-4
  num_epochs: 1
  total_steps: 100
  num_workers: 2
  grad_clip: 1.0
  log_freq: 10
  val_freq: 1000000
  checkpoint_freq: 100
  gen_mode: "parallel"
  inference_steps: 10

wandb:
  project: "AC-WM-Phys-ALRD"
  run_name: "alrd_push_cube_teacher_small"

distributed:
  use_fsdp: false
